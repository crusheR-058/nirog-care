services:
  db:
    image: postgres:17-alpine
    container_name: nirog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nirog
      POSTGRES_PASSWORD: nirog_dev
      POSTGRES_DB: nirog
    ports:
      - "5433:5432"
    volumes:
      - nirog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nirog -d nirog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nirog-pgdata:
