# coturn configuration for Nirog.
# Realm, secret and external IP are supplied on the command line by
# docker-compose.turn.yml so no credential is ever committed to this repo.

listening-port=3478
tls-listening-port=5349

# Relay only — this server must never be usable as an open proxy.
fingerprint
use-auth-secret

# Ephemeral credentials: username is "<unix-expiry>:<user>", password is
# base64(HMAC-SHA1(static-auth-secret, username)). src/lib/webrtc/ice.ts mints
# exactly this pair, so nothing shared is stored on either side.
stale-nonce=600

cert=/etc/coturn/cert.pem
pkey=/etc/coturn/pkey.pem
# Modern ciphers only; the default list includes suites we don't want.
cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS"
no-tlsv1
no-tlsv1_1

# Relay port range. Open these UDP ports on the firewall/security group.
min-port=49160
max-port=49200

# ── Abuse containment ───────────────────────────────────────────────────────
# A TURN server with default settings can be used to reach internal services.
# Deny every private/reserved range so a relayed peer can only talk to the
# public internet, never our own infrastructure.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=224.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Per-session ceilings — one consultation needs well under this.
user-quota=12
total-quota=1200
max-bps=2000000

# coturn's own admin surfaces are not used; leave them off.
no-cli
no-software-attribute

# Logging to stdout so `docker compose logs` is the single place to look.
log-file=stdout
simple-log
